name: CI

# Validate every PR (and pushes to main) — the build already runs tsc --noEmit, so this
# covers typecheck + tests + production build. Deploy stays in deploy.yml (main only).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          GH_PAGES: 1
